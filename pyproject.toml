[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q --strict-markers"
filterwarnings = [
    "ignore::DeprecationWarning",
    "ignore::PendingDeprecationWarning",
]

[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = ["notebooks", "dashboard_assets"]

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "F",    # pyflakes
    "I",    # isort
    "B",    # bugbear
    "UP",   # pyupgrade
]
ignore = [
    "E501",  # line length handled by formatter
    "B008",  # FastAPI Depends() requires this pattern
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["E402"]  # late imports after env var setup
"app/streamlit_app.py" = ["E402"]  # path manipulation before imports
