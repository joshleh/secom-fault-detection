name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install runtime + dev dependencies (no torch)
        # Skip torch — heavy CPU-only wheel that we don't need to run tests
        # against the dashboard snapshot. Everything else from requirements-dev.
        run: |
          python -m pip install --upgrade pip
          grep -v "^torch" requirements-dev.txt > /tmp/req-ci.txt
          pip install -r /tmp/req-ci.txt

      - name: Lint with ruff
        run: ruff check .

      - name: Run pytest
        run: pytest tests/ -v
