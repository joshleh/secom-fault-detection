name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install runtime + dev dependencies (no torch / mlflow)
        # Skip torch and mlflow — heavy wheels we don't need to run tests
        # against the dashboard snapshot. Filter in-place so pip still
        # resolves the nested "-r requirements.txt" reference correctly.
        run: |
          python -m pip install --upgrade pip
          grep -vE "^(torch|mlflow)" requirements-dev.txt > requirements-ci.txt
          pip install -r requirements-ci.txt

      - name: Lint with ruff
        run: ruff check .

      - name: Run pytest
        run: pytest tests/ -v

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t secom-fault-detection:ci .

      - name: Smoke test API container
        run: |
          set -e
          docker run -d --name secom-api -p 8000:8000 secom-fault-detection:ci
          # Poll /health until it responds, then probe /metadata.
          # Print container logs on any failure so future regressions are visible.
          trap 'echo "--- container logs ---"; docker logs secom-api || true; docker rm -f secom-api || true' EXIT
          ok=0
          for i in $(seq 1 15); do
            sleep 2
            if curl -fsS http://localhost:8000/health > /dev/null; then
              echo "API healthy after $((i*2))s"
              ok=1
              break
            fi
          done
          if [ "$ok" -ne 1 ]; then
            echo "API never became healthy" >&2
            exit 1
          fi
          curl -fsS http://localhost:8000/health
          echo
          curl -fsS http://localhost:8000/metadata | head -c 300
          echo
